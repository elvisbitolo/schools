kind = "web"
previewPath = "/"
title = "SchoolHub - School Management System"
version = "1.0.0"
id = "artifacts/school-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18223

[services.development]
run = "pnpm --filter @workspace/school-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-hub", "run", "build" ]
publicDir = "artifacts/school-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18223"
BASE_PATH = "/"
